# ==============================================================================
# Minerva - Docker Compose PRODUCCIÓN
# Configuración optimizada para despliegue en servidor
# ==============================================================================

services:

  # ============================================================================
  # NGINX GATEWAY - Punto de entrada único (Puerto 9122)
  # ============================================================================
  nginx-gateway:
    build:
      context: ./nginx-gateway
      dockerfile: Dockerfile
    image: minerva-nginx-gateway:production
    container_name: minerva-gateway
    restart: always
    ports:
      - "${GATEWAY_PORT:-9122}:9122"
    depends_on:
      minerva-frontend:
        condition: service_healthy
      laravel-web:
        condition: service_started
    networks:
      - minerva-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9122/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # FRONTEND - Angular 17 (Build de producción con Nginx)
  # ============================================================================
  minerva-frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile.production
    image: minerva-frontend:production
    container_name: minerva-frontend
    restart: always
    networks:
      - minerva-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # BACKEND LARAVEL - Aplicación PHP-FPM (Producción)
  # ============================================================================
  laravel-app:
    build:
      context: ./Backend
      dockerfile: Dockerfile.production
      args:
        user: ${WWWUSER:-minerva}
        uid: ${WWWUSER_ID:-1000}
    image: minerva-backend-app:production
    container_name: minerva-app
    restart: always
    working_dir: /var/www
    volumes:
      # Solo volúmenes necesarios para runtime
      - backend_storage:/var/www/storage
      - ${SHARED_DIR_ENTRADA:-./Shared/entrada}:${RUTA_CONTENEDOR_ENTRADA:-/app/compartido/entrada}
      - ${SHARED_DIR_SALIDA:-./Shared/salida}:${RUTA_CONTENEDOR_SALIDA:-/app/compartido/salida}
    environment:
      - APP_NAME=${APP_NAME:-MinervaBackend}
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-http://150.214.56.73:9122}
      - APP_LOCALE=${APP_LOCALE:-es}
      - APP_FALLBACK_LOCALE=${APP_FALLBACK_LOCALE:-es}
      - APP_FAKER_LOCALE=${APP_FAKER_LOCALE:-es_ES}
      - BCRYPT_ROUNDS=${BCRYPT_ROUNDS:-12}
      - LOG_CHANNEL=${LOG_CHANNEL:-stack}
      - LOG_STACK=${LOG_STACK:-single}
      - LOG_LEVEL=${LOG_LEVEL:-warning}
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=minerva-db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-minerva_production}
      - DB_USERNAME=${DB_USERNAME:-minerva_prod}
      - DB_PASSWORD=${DB_PASSWORD}
      - SESSION_DRIVER=${SESSION_DRIVER:-database}
      - SESSION_LIFETIME=${SESSION_LIFETIME:-120}
      - BROADCAST_CONNECTION=${BROADCAST_CONNECTION:-log}
      - FILESYSTEM_DISK=${FILESYSTEM_DISK:-local}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-database}
      - CACHE_STORE=${CACHE_STORE:-database}
      - AI_BACKEND_URL=${AI_BACKEND_URL:-http://minerva-asr:8000}
      - AI_SERVICE_URL=${AI_SERVICE_URL:-http://minerva-asr:8000}
      - AI_INPUT_PATH=${RUTA_CONTENEDOR_ENTRADA:-/app/compartido/entrada}
      - AI_TIMEOUT=${AI_TIMEOUT:-300}
    networks:
      - minerva-network
    depends_on:
      minerva-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f php-fpm || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================================
  # BACKEND LARAVEL - Servidor Web Nginx
  # ============================================================================
  laravel-web:
    image: nginx:alpine
    container_name: minerva-nginx
    restart: always
    volumes:
      - backend_storage:/var/www/storage:ro
      - ./Backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      laravel-app:
        condition: service_healthy
    networks:
      - minerva-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # BASE DE DATOS - MariaDB
  # ============================================================================
  minerva-db:
    image: mariadb:latest
    container_name: minerva-db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-minerva_production}
      MYSQL_USER: ${DB_USERNAME:-minerva_prod}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_ALLOW_EMPTY_PASSWORD: 0
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - minerva-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================================================
  # IA - Servicio ASR (Reconocimiento de Voz con Qwen3)
  # ============================================================================
  minerva-asr:
    build:
      context: ./IA
      dockerfile: Dockerfile.asr
    image: minerva-asr:production
    container_name: minerva-asr
    restart: always
    shm_size: 4gb
    volumes:
      - ./IA/main.py:/app/main.py:ro
      - ./IA/ASR:/app/ASR:ro
      - ${SHARED_DIR_ENTRADA:-./Shared/entrada}:${RUTA_CONTENEDOR_ENTRADA:-/app/compartido/entrada}
      - ${SHARED_DIR_SALIDA:-./Shared/salida}:${RUTA_CONTENEDOR_SALIDA:-/app/compartido/salida}
      - ia_cache_hf:/root/.cache/huggingface
      - ia_cache_torch:/root/.cache/torch
    environment:
      - MODELO_ASR=${MODELO_ASR:-Qwen/Qwen3-ASR-1.7B}
      - MODELO_ALIGNER=${MODELO_ALIGNER:-Qwen/Qwen3-ForcedAligner-0.6B}
      - DISPOSITIVO_ASR=${DISPOSITIVO_ASR:-cuda:0}
      - URL_DIARIZADOR=${URL_DIARIZADOR:-http://minerva-diarizador:8000}
      - RUTA_ENTRADA=${RUTA_CONTENEDOR_ENTRADA:-/app/compartido/entrada}
      - RUTA_SALIDA_TRANSCRIPCIONES=${RUTA_CONTENEDOR_SALIDA:-/app/compartido/salida}
      - NOMBRE_ARCHIVO_TRANSCRIPCION=${NOMBRE_ARCHIVO_TRANSCRIPCION:-transcripcion.txt}
      - NOMBRE_ARCHIVO_CONVERSACION=${NOMBRE_ARCHIVO_CONVERSACION:-conversacion.json}
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 4G
          devices:
            - driver: nvidia
              device_ids: ['${ID_GPU:-0}']
              capabilities: [gpu]
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    networks:
      - minerva-network
    depends_on:
      minerva-diarizador:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/estado"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================================================
  # IA - Servicio Diarizador (Senko)
  # ============================================================================
  minerva-diarizador:
    build:
      context: ./IA
      dockerfile: Dockerfile.diarizador
    image: minerva-diarizador:production
    container_name: minerva-diarizador
    restart: always
    shm_size: 2gb
    volumes:
      - ./IA/DIARIZADOR/main.py:/app/main.py:ro
      - ${SHARED_DIR_ENTRADA:-./Shared/entrada}:${RUTA_CONTENEDOR_ENTRADA:-/app/compartido/entrada}
      - ${SHARED_DIR_SALIDA:-./Shared/salida}:${RUTA_CONTENEDOR_SALIDA:-/app/compartido/salida}
      - ia_cache_hf:/root/.cache/huggingface
      - ia_cache_torch:/root/.cache/torch
    environment:
      - SENKO_DEVICE=${SENKO_DEVICE:-cuda}
      - SENKO_VAD=${SENKO_VAD:-pyannote}
      - SENKO_CLUSTERING=${SENKO_CLUSTERING:-auto}
      - RUTA_ENTRADA=${RUTA_CONTENEDOR_ENTRADA:-/app/compartido/entrada}
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 4G
          devices:
            - driver: nvidia
              device_ids: ['${ID_GPU:-0}']
              capabilities: [gpu]
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    networks:
      - minerva-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/estado"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# ==============================================================================
# REDES
# ==============================================================================
networks:
  minerva-network:
    driver: bridge

# ==============================================================================
# VOLUMENES PERSISTENTES
# ==============================================================================
volumes:
  db_data:
    name: minerva_db_data_production
  backend_storage:
    name: minerva_backend_storage_production
  ia_cache_hf:
    name: minerva_ia_cache_hf_production
  ia_cache_torch:
    name: minerva_ia_cache_torch_production
