# ==============================================================================
# Minerva - Docker Compose Unificado
# Orquesta todos los servicios: Frontend, Backend Laravel, Base de Datos e IA.
# ==============================================================================

services:

  # ============================================================================
  # FRONTEND - Angular 17 (Servidor de desarrollo)
  # ============================================================================
  frontend:
    image: node:20-alpine
    container_name: minerva-frontend
    working_dir: /app
    volumes:
      - ./Frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-4200}:4200"
    command: >
      sh -c "npm install && npx ng serve --host 0.0.0.0 --port 4200 --poll 2000"
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    networks:
      - minerva-network
    depends_on:
      - laravel-web
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4200"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # BACKEND LARAVEL - Aplicación PHP-FPM
  # ============================================================================
  laravel-app:
    build:
      context: ./Backend
      args:
        user: ${WWWUSER:-minerva}
        uid: ${WWWUSER_ID:-1000}
    image: minerva-backend-app
    container_name: minerva-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./Backend:/var/www
      - backend_vendor:/var/www/vendor
    environment:
      - APP_NAME=${APP_NAME:-MinervaBackend}
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_URL=${APP_URL:-http://localhost}
      - APP_LOCALE=${APP_LOCALE:-es}
      - APP_FALLBACK_LOCALE=${APP_FALLBACK_LOCALE:-es}
      - APP_FAKER_LOCALE=${APP_FAKER_LOCALE:-es_ES}
      - BCRYPT_ROUNDS=${BCRYPT_ROUNDS:-12}
      - LOG_CHANNEL=${LOG_CHANNEL:-stack}
      - LOG_STACK=${LOG_STACK:-single}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=minerva-db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-backend_minerva}
      - DB_USERNAME=${DB_USERNAME:-minerva}
      - DB_PASSWORD=${DB_PASSWORD:-minerva_secret}
      - SESSION_DRIVER=${SESSION_DRIVER:-database}
      - SESSION_LIFETIME=${SESSION_LIFETIME:-120}
      - BROADCAST_CONNECTION=${BROADCAST_CONNECTION:-log}
      - FILESYSTEM_DISK=${FILESYSTEM_DISK:-local}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-redis}
      - CACHE_STORE=${CACHE_STORE:-database}
      - REDIS_HOST=minerva-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=null
      - AI_BACKEND_URL=${AI_BACKEND_URL:-http://minerva-asr:8000}
      - AI_SERVICE_URL=${AI_SERVICE_URL:-http://minerva-asr:8000}
      - IA_UPLOAD_URL=${IA_UPLOAD_URL:-http://minerva-asr:8000}
      - IA_CALLBACK_SECRET=${IA_CALLBACK_SECRET:-cambiar_por_secret_generado_con_openssl_rand_base64_32}
      - LARAVEL_URL=${LARAVEL_URL:-http://minerva-nginx:80}
      - AUDIO_MAX_SIZE_MB=${AUDIO_MAX_SIZE_MB:-2048}
      - AI_TIMEOUT=${AI_TIMEOUT:-7200}
    networks:
      - minerva-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x php-fpm > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # LARAVEL WORKER - Procesa cola de audio
  # ============================================================================
  laravel-worker:
    build:
      context: ./Backend
      args:
        user: ${WWWUSER:-minerva}
        uid: ${WWWUSER_ID:-1000}
    image: minerva-backend-app
    container_name: minerva-worker
    working_dir: /var/www
    volumes:
      - ./Backend:/var/www
      - backend_vendor:/var/www/vendor
    environment:
      - APP_NAME=${APP_NAME:-MinervaBackend}
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=minerva-db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-backend_minerva}
      - DB_USERNAME=${DB_USERNAME:-minerva}
      - DB_PASSWORD=${DB_PASSWORD:-minerva_secret}
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=minerva-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=null
      - IA_UPLOAD_URL=${IA_UPLOAD_URL:-http://minerva-asr:8000}
      - IA_CALLBACK_SECRET=${IA_CALLBACK_SECRET:-cambiar_por_secret_generado_con_openssl_rand_base64_32}
      - LARAVEL_URL=${LARAVEL_URL:-http://minerva-nginx:80}
      - AUDIO_MAX_SIZE_MB=${AUDIO_MAX_SIZE_MB:-2048}
    command: php artisan queue:work redis --queue=process_audio,default --tries=3 --max-time=3600
    depends_on:
      - minerva-db
      - minerva-redis
      - laravel-app
    networks:
      - minerva-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x php > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  # ============================================================================
  # BACKEND LARAVEL - Servidor Web Nginx
  # ============================================================================
  laravel-web:
    image: nginx:alpine
    container_name: minerva-nginx
    restart: unless-stopped
    ports:
      - "${LARAVEL_PORT:-8001}:80"
    volumes:
      - ./Backend:/var/www
      - ./Backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - laravel-app
    networks:
      - minerva-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # BASE DE DATOS - MariaDB
  # ============================================================================
  minerva-db:
    image: mariadb:latest
    container_name: minerva-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-backend_minerva}
      MYSQL_USER: ${DB_USERNAME:-minerva}
      MYSQL_PASSWORD: ${DB_PASSWORD:-minerva_secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
      MYSQL_ALLOW_EMPTY_PASSWORD: 0
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - minerva-network
    ports:
      - "${DB_EXTERNAL_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # IA - Servicio ASR (Reconocimiento de Voz con Qwen3)
  # ============================================================================
  minerva-asr:
    build:
      context: ./IA
      dockerfile: Dockerfile.asr
    container_name: minerva-asr
    shm_size: 4gb
    ports:
      - "${IA_ASR_PORT:-8002}:8000"
    volumes:
      - ./IA/main.py:/app/main.py
      - ./IA/ASR:/app/ASR
      - ./IA/procesamiento.py:/app/procesamiento.py
      # Temporal para archivos en procesamiento (se borra después)
      - ia_temporal:/tmp
      - ia_cache_hf:/root/.cache/huggingface
      - ia_cache_torch:/root/.cache/torch
    environment:
      - MODELO_ASR=${MODELO_ASR:-Qwen/Qwen3-ASR-1.7B}
      - MODELO_ALIGNER=${MODELO_ALIGNER:-Qwen/Qwen3-ForcedAligner-0.6B}
      - DISPOSITIVO_ASR=${DISPOSITIVO_ASR:-cuda:0}
      - URL_DIARIZADOR=${URL_DIARIZADOR:-http://minerva-diarizador:8000}
      - LARAVEL_URL=${LARAVEL_URL:-http://minerva-nginx:80}
      - CALLBACK_SECRET=${IA_CALLBACK_SECRET:-cambiar_por_secret_generado_con_openssl_rand_base64_32}
      - RUTA_TEMPORAL=/tmp
      - NVIDIA_VISIBLE_DEVICES=${ID_GPU:-0}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    runtime: nvidia
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    networks:
      - minerva-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/estado"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # IA - Servicio Diarizador (Senko)
  # ============================================================================
  minerva-diarizador:
    build:
      context: ./IA
      dockerfile: Dockerfile.diarizador
    container_name: minerva-diarizador
    shm_size: 2gb
    volumes:
      - ./IA/DIARIZADOR/main.py:/app/main.py
      - ia_temporal:/tmp
      - ia_cache_hf:/root/.cache/huggingface
      - ia_cache_torch:/root/.cache/torch
    environment:
      - SENKO_DEVICE=${SENKO_DEVICE:-cuda}
      - SENKO_VAD=${SENKO_VAD:-pyannote}
      - SENKO_CLUSTERING=${SENKO_CLUSTERING:-auto}
      - RUTA_TEMPORAL=/tmp
      - NVIDIA_VISIBLE_DEVICES=${ID_GPU:-0}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    runtime: nvidia
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    networks:
      - minerva-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/estado"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # REDIS - Broker de colas para Laravel
  # ============================================================================
  minerva-redis:
    image: redis:7-alpine
    container_name: minerva-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - minerva-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

# ==============================================================================
# REDES
# ==============================================================================
networks:
  minerva-network:
    driver: bridge

# ==============================================================================
# VOLUMENES PERSISTENTES
# ==============================================================================
volumes:
  db_data:
    name: minerva_db_data
  frontend_node_modules:
    name: minerva_frontend_node_modules
  backend_vendor:
    name: minerva_backend_vendor
  ia_cache_hf:
    name: minerva_ia_cache_hf
  ia_cache_torch:
    name: minerva_ia_cache_torch
  ia_temporal:
    name: minerva_ia_temporal
    # NOTA: Este volumen es EFÍMERO - se borra automáticamente
    # Los archivos de audio se eliminan después de procesar
  redis_data:
    name: minerva_redis_data
