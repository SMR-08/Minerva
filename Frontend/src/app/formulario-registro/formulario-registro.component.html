<div class="formulario-contenedor">
  <h2>Formulario de Registro</h2>
  
  <form (ngSubmit)="onSubmit()" #registroForm="ngForm">
    <!-- Campo Nombre -->
    <div class="form-group">
      <label for="nombre">Nombre:</label>
      <input 
        type="text" 
        id="nombre" 
        name="nombre"
        [(ngModel)]="formulario.nombre"
        required
        placeholder="Ingrese su nombre completo"
        class="form-control"
      >
      <small *ngIf="formulario.nombre === '' && enviado" class="error">El nombre es requerido</small>
    </div>

    <!-- Campo Usuario -->
    <div class="form-group">
      <label for="usuario">Usuario:</label>
      <input 
        type="text" 
        id="usuario" 
        name="usuario"
        [(ngModel)]="formulario.usuario"
        required
        placeholder="Ingrese su nombre de usuario"
        class="form-control"
      >
      <small *ngIf="formulario.usuario === '' && enviado" class="error">El usuario es requerido</small>
    </div>

    <!-- Campo Contraseña -->
    <div class="form-group">
      <label for="contrasena">Contraseña:</label>
      <input 
        type="password" 
        id="contrasena" 
        name="contrasena"
        [(ngModel)]="formulario.contrasena"
        required
        placeholder="Ingrese su contraseña (mín. 6 caracteres)"
        class="form-control"
      >
      <small *ngIf="formulario.contrasena === '' && enviado" class="error">La contraseña es requerida</small>
      <small *ngIf="formulario.contrasena && formulario.contrasena.length < 6" class="error">Mínimo 6 caracteres</small>
    </div>

    <!-- Campo Confirmar Contraseña -->
    <div class="form-group">
      <label for="contrasenaConfirmar">Confirmar Contraseña:</label>
      <input 
        type="password" 
        id="contrasenaConfirmar" 
        name="contrasenaConfirmar"
        [(ngModel)]="formulario.contrasenaConfirmar"
        required
        placeholder="Confirme su contraseña"
        class="form-control"
      >
      <small *ngIf="formulario.contrasenaConfirmar === '' && enviado" class="error">Debe confirmar la contraseña</small>
      <small *ngIf="formulario.contrasena !== formulario.contrasenaConfirmar && formulario.contrasenaConfirmar" class="error">Las contraseñas no coinciden</small>
    </div>

    <!-- Botones de Acción -->
    <div class="form-actions">
      <button 
        type="submit" 
        [disabled]="!formulario.nombre || !formulario.usuario || !formulario.contrasena || !formulario.contrasenaConfirmar"
        class="btn-registrar"
      >
        Registrarse
      </button>
      <button 
        type="reset" 
        class="btn-limpiar"
        (click)="onLimpiar()"
      >
        Limpiar
      </button>
    </div>

    <!-- Mensaje de estado -->
    <div *ngIf="mensaje" [ngClass]="{'mensaje-exito': !error, 'mensaje-error': error}">
      {{ mensaje }}
    </div>
  </form>
</div>
