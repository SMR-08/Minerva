<div class="auth-page">
  <div class="auth-bg-pattern"></div>

  <div class="auth-card">
    <!-- Back button -->
    <a routerLink="/" class="btn-volver">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
      Volver
    </a>

    <!-- Logo -->
    <div class="auth-logo">
      <img src="assets/images/minerva-seal-logo.png" alt="Minerva" />
    </div>

    <!-- Title -->
    <h1 class="auth-title">ÚNETE A MINERVA</h1>
    <p class="auth-subtitle">Crea tu cuenta y comienza a organizar tu conocimiento</p>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" #registroForm="ngForm" class="auth-form">
      <div class="form-group">
        <label for="nombre">Tu nombre completo</label>
        <input
          type="text"
          id="nombre"
          name="nombre"
          [(ngModel)]="formulario.nombre"
          required
          placeholder="Tu nombre"
          class="form-input"
        />
        <small *ngIf="formulario.nombre === '' && enviado" class="error-msg">El nombre es requerido</small>
      </div>

      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="formulario.email"
          required
          placeholder="nombre@universidad.edu"
          class="form-input"
        />
        <small *ngIf="formulario.email === '' && enviado" class="error-msg">El email es requerido</small>
      </div>

      <div class="form-group">
        <label for="contrasena">Contraseña</label>
        <input
          [type]="mostrarContrasena ? 'text' : 'password'"
          id="contrasena"
          name="contrasena"
          [(ngModel)]="formulario.contrasena"
          required
          placeholder="••••••••"
          class="form-input"
        />
        <small *ngIf="formulario.contrasena === '' && enviado" class="error-msg">La contraseña es requerida</small>
      </div>

      <div class="form-group">
        <label for="contrasenaConfirm">Confirmar Contraseña</label>
        <input
          [type]="mostrarContrasenaConfirm ? 'text' : 'password'"
          id="contrasenaConfirm"
          name="contrasenaConfirm"
          [(ngModel)]="formulario.contrasenaConfirm"
          required
          placeholder="••••••••"
          class="form-input"
        />
        <small *ngIf="formulario.contrasenaConfirm === '' && enviado" class="error-msg">Confirma tu contraseña</small>
      </div>

      <button type="submit" class="btn-submit" [disabled]="!formulario.nombre || !formulario.email || !formulario.contrasena || !formulario.contrasenaConfirm">
        REGISTRARSE
      </button>

      <div *ngIf="mensaje" [ngClass]="{'msg-success': !error, 'msg-error': error}">
        {{ mensaje }}
      </div>
    </form>

    <!-- Footer -->
    <div class="auth-footer">
      <p>¿Ya tienes una cuenta? <a routerLink="/login">Inicia sesión</a></p>
    </div>
  </div>
</div>
