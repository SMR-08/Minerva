<div class="registro-container">
  <div class="registro-box">
    <h2>Crear Cuenta</h2>
    <p class="registro-subtitle">Únete a Minerva hoy</p>

    <form (ngSubmit)="onSubmit()" #registroForm="ngForm">
      <!-- Campo Nombre -->
      <div class="form-group">
        <label for="nombre">Nombre Completo:</label>
        <input 
          type="text" 
          id="nombre" 
          name="nombre"
          [(ngModel)]="formulario.nombre"
          required
          placeholder="Ingrese su nombre completo"
          class="form-control"
        >
        <small *ngIf="formulario.nombre === '' && enviado" class="error">El nombre es requerido</small>
      </div>

      <!-- Campo Usuario -->
      <div class="form-group">
        <label for="email">Email:</label>
        <input 
          type="text" 
          id="email" 
          name="email"
          [(ngModel)]="formulario.email"
          required
          placeholder="Ingrese su correo electrónico"
          class="form-control"
        >
        <small *ngIf="formulario.email === '' && enviado" class="error">El email es requerido</small>
      </div>

      <!-- Campo Contraseña -->
      <div class="form-group">
        <label for="contrasena">Contraseña:</label>
        <div class="password-input-group">
          <input 
            [type]="mostrarContrasena ? 'text' : 'password'" 
            id="contrasena" 
            name="contrasena"
            [(ngModel)]="formulario.contrasena"
            required
            placeholder="Mínimo 6 caracteres"
            class="form-control"
          >
          <button
            type="button"
            class="btn-toggle-password"
            (click)="toggleMostrarContrasena()"
            title="{{ mostrarContrasena ? 'Ocultar contraseña' : 'Mostrar contraseña' }}"
          >
            <svg *ngIf="mostrarContrasena" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M12 6c3.79 0 7.17 2.13 8.82 5.5C19.17 14.87 15.79 17 12 17s-7.17-2.13-8.82-5.5C4.83 8.13 8.21 6 12 6m0-2C7 4 2.73 7.11 1 11.5 2.73 15.89 7 19 12 19s9.27-3.11 11-7.5C21.27 7.11 17 4 12 4zm0 5c1.38 0 2.5 1.12 2.5 2.5S13.38 14 12 14s-2.5-1.12-2.5-2.5S10.62 9 12 9m0-2c-2.48 0-4.5 2.02-4.5 4.5S9.52 16 12 16s4.5-2.02 4.5-4.5S14.48 7 12 7z"></path>
            </svg>
            <svg *ngIf="!mostrarContrasena" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M12 6c3.79 0 7.17 2.13 8.82 5.5-.59 1.22-1.42 2.27-2.41 3.12l1.41 1.41c1.39-1.23 2.49-2.77 3.18-4.53C21.27 7.11 17 4 12 4c-1.27 0-2.49.2-3.64.57l1.65 1.65C10.66 6.09 11.32 6 12 6zm-1.07 1.14L13 9.21c.57.25 1.03.71 1.28 1.28l2.07 2.07c.08-.34.14-.7.14-1.07C16.5 9.01 14.48 7 12 7c-.37 0-.72.05-1.07.14zM2.01 3.87l2.68 2.68C3.06 7.83 1.77 9.53 1 11.5 2.73 15.89 7 19 12 19c1.52 0 2.98-.29 4.32-.82l3.42 3.42 1.41-1.41L3.42 2.45 2.01 3.87zm7.5 7.5 2.61 2.61c-.04.01-.08.02-.12.02-1.38 0-2.5-1.12-2.5-2.5 0-.05.01-.08.01-.13zm-3.4-3.4 1.75 1.75c-.23.55-.36 1.15-.36 1.78 0 2.48 2.02 4.5 4.5 4.5.63 0 1.23-.13 1.77-.36l.98.98c-.88.24-1.8.38-2.75.38-3.79 0-7.17-2.13-8.82-5.5.7-1.43 1.72-2.61 2.93-3.53z"></path>
            </svg>
          </button>
        </div>
        <small *ngIf="formulario.contrasena === '' && enviado" class="error">La contraseña es requerida</small>
        <small *ngIf="formulario.contrasena.length < 6 && formulario.contrasena.length > 0" class="error">Mínimo 6 caracteres</small>
      </div>

      <!-- Campo Confirmar Contraseña -->
      <div class="form-group">
        <label for="contrasenaConfirmar">Confirmar Contraseña:</label>
        <div class="password-input-group">
          <input 
            [type]="mostrarContrasenaConfirm ? 'text' : 'password'" 
            id="contrasenaConfirmar" 
            name="contrasenaConfirmar"
            [(ngModel)]="formulario.contrasenaConfirmar"
            required
            placeholder="Confirme su contraseña"
            class="form-control"
          >
          <button
            type="button"
            class="btn-toggle-password"
            (click)="toggleMostrarContrasenaConfirm()"
            title="{{ mostrarContrasenaConfirm ? 'Ocultar contraseña' : 'Mostrar contraseña' }}"
          >
            <svg *ngIf="mostrarContrasenaConfirm" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M12 6c3.79 0 7.17 2.13 8.82 5.5C19.17 14.87 15.79 17 12 17s-7.17-2.13-8.82-5.5C4.83 8.13 8.21 6 12 6m0-2C7 4 2.73 7.11 1 11.5 2.73 15.89 7 19 12 19s9.27-3.11 11-7.5C21.27 7.11 17 4 12 4zm0 5c1.38 0 2.5 1.12 2.5 2.5S13.38 14 12 14s-2.5-1.12-2.5-2.5S10.62 9 12 9m0-2c-2.48 0-4.5 2.02-4.5 4.5S9.52 16 12 16s4.5-2.02 4.5-4.5S14.48 7 12 7z"></path>
            </svg>
            <svg *ngIf="!mostrarContrasenaConfirm" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M12 6c3.79 0 7.17 2.13 8.82 5.5-.59 1.22-1.42 2.27-2.41 3.12l1.41 1.41c1.39-1.23 2.49-2.77 3.18-4.53C21.27 7.11 17 4 12 4c-1.27 0-2.49.2-3.64.57l1.65 1.65C10.66 6.09 11.32 6 12 6zm-1.07 1.14L13 9.21c.57.25 1.03.71 1.28 1.28l2.07 2.07c.08-.34.14-.7.14-1.07C16.5 9.01 14.48 7 12 7c-.37 0-.72.05-1.07.14zM2.01 3.87l2.68 2.68C3.06 7.83 1.77 9.53 1 11.5 2.73 15.89 7 19 12 19c1.52 0 2.98-.29 4.32-.82l3.42 3.42 1.41-1.41L3.42 2.45 2.01 3.87zm7.5 7.5 2.61 2.61c-.04.01-.08.02-.12.02-1.38 0-2.5-1.12-2.5-2.5 0-.05.01-.08.01-.13zm-3.4-3.4 1.75 1.75c-.23.55-.36 1.15-.36 1.78 0 2.48 2.02 4.5 4.5 4.5.63 0 1.23-.13 1.77-.36l.98.98c-.88.24-1.8.38-2.75.38-3.79 0-7.17-2.13-8.82-5.5.7-1.43 1.72-2.61 2.93-3.53z"></path>
            </svg>
          </button>
        </div>
        <small *ngIf="formulario.contrasenaConfirmar === '' && enviado" class="error">Debe confirmar la contraseña</small>
        <small *ngIf="formulario.contrasena !== formulario.contrasenaConfirmar && formulario.contrasenaConfirmar.length > 0" class="error">Las contraseñas no coinciden</small>
      </div>

      <!-- Botones de Acción -->
      <div class="form-actions">
        <button 
          type="submit" 
          [disabled]="!formulario.nombre || !formulario.email || !formulario.contrasena || !formulario.contrasenaConfirmar"
          class="btn-registrar"
        >
          Registrarse
        </button>
        <button 
          type="reset" 
          class="btn-limpiar"
          (click)="onLimpiar()"
        >
          Limpiar
        </button>
      </div>

      <!-- Mensaje de estado -->
      <div *ngIf="mensaje" [ngClass]="{'mensaje-exito': !error, 'mensaje-error': error}">
        {{ mensaje }}
      </div>
    </form>

    <!-- Footer con link a login -->
    <div class="registro-footer">
      <p>¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión aquí</a></p>
    </div>
  </div>
</div>
