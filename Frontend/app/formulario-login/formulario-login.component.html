<div class="auth-page">
  <div class="auth-bg-pattern"></div>

  <div class="auth-card">
    <!-- Back button -->
    <a routerLink="/" class="btn-volver">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
      Volver
    </a>

    <!-- Logo -->
    <div class="auth-logo">
      <img src="assets/images/minerva-seal-logo.png" alt="Minerva" />
    </div>

    <!-- Title -->
    <h1 class="auth-title">BIENVENIDO A MINERVA</h1>
    <p class="auth-subtitle">Inicia sesión para acceder a tu sabiduría organizada</p>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="auth-form">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="formulario.email"
          required
          placeholder="nombre@universidad.edu"
          class="form-input"
        />
        <small *ngIf="formulario.email === '' && enviado" class="error-msg">El email es requerido</small>
      </div>

      <div class="form-group">
        <div class="label-row">
          <label for="contrasena">Contraseña</label>
          <a href="#" class="forgot-link">¿Olvidaste la contraseña?</a>
        </div>
        <input
          [type]="mostrarContrasena ? 'text' : 'password'"
          id="contrasena"
          name="contrasena"
          [(ngModel)]="formulario.contrasena"
          required
          placeholder="••••••••"
          class="form-input"
        />
        <small *ngIf="formulario.contrasena === '' && enviado" class="error-msg">La contraseña es requerida</small>
      </div>

      <button type="submit" class="btn-submit" [disabled]="!formulario.email || !formulario.contrasena">
        INICIAR SESIÓN
      </button>

      <div *ngIf="mensaje" [ngClass]="{'msg-success': !error, 'msg-error': error}">
        {{ mensaje }}
      </div>
    </form>

    <!-- Footer -->
    <div class="auth-footer">
      <p>¿No tienes una cuenta? <a routerLink="/registro">Regístrate gratis</a></p>
    </div>
  </div>
</div>
