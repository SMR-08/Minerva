user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    log_format json_structured escape=json
        '{'
            '"timestamp":"$time_iso8601",'
            '"level":"info",'
            '"service":"gateway",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log json_structured;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ============================================
    # UPLOADS GRANDES (Arquitectura "Patata Caliente")
    # ============================================
    client_max_body_size 2048M;  # 2GB para audios de hasta 3 horas
    client_body_timeout 7200;     # 2 horas para upload
    client_body_buffer_size 1M;   # Buffer pequeño para streaming

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;

    # ============================================
    # PROXY-AWARE: detectar proto/host del upstream proxy (ALB, etc.)
    # Si hay X-Forwarded-Proto del proxy, usarlo. Si no, usar $scheme.
    # ============================================
    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    map $http_x_forwarded_host $forwarded_host {
        default $http_x_forwarded_host;
        ''      $host;
    }

    server {
        listen 9122;
        server_name _;

        # Nunca incluir puerto interno en redirects generados por nginx.
        # El puerto visible al usuario lo decide el proxy upstream (ALB: 443).
        port_in_redirect off;
        absolute_redirect off;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Frontend - Angular SPA
        location / {
            proxy_pass ${FRONTEND_UPSTREAM};
            proxy_set_header Host $forwarded_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $forwarded_host;
        }

        # Backend API - Laravel
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass ${BACKEND_UPSTREAM};
            proxy_set_header Host $forwarded_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $forwarded_host;

            # CORS headers (backup, Laravel también los maneja)
            add_header Access-Control-Allow-Origin "${CORS_ALLOWED_ORIGINS}" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # Assets de Filament (panel admin)
        location /build/ {
            proxy_pass ${BACKEND_UPSTREAM};
            proxy_set_header Host $forwarded_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $forwarded_host;
        }

        # Backend Admin Panel - Laravel
        location /admin/ {
            proxy_pass ${BACKEND_UPSTREAM};
            proxy_set_header Host $forwarded_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $forwarded_host;
        }

        # Upload de audio con streaming
        location /api/temas/*/procesar-audio {
            limit_req zone=upload_limit burst=5 nodelay;

            proxy_pass ${BACKEND_UPSTREAM};
            proxy_set_header Host $forwarded_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $forwarded_host;

            # Streaming: desactivar buffering
            proxy_request_buffering off;
            proxy_buffering off;

            # Timeout largo para upload + procesamiento
            proxy_read_timeout 7200s;
            proxy_send_timeout 7200s;
        }

        # SSE (Server-Sent Events) - Actualizaciones en tiempo real
        location /api/transcripciones/ {
            proxy_pass ${BACKEND_UPSTREAM};
            proxy_set_header Host $forwarded_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $forwarded_host;

            # SSE: desactivar buffering completamente
            proxy_buffering off;
            proxy_cache off;
            proxy_request_buffering off;

            # Headers para SSE
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;

            # Timeout largo para mantener conexión SSE
            proxy_read_timeout 7200s;
            proxy_send_timeout 7200s;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
