user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ============================================
    # UPLOADS GRANDES (Arquitectura "Patata Caliente")
    # ============================================
    client_max_body_size 2048M;  # 2GB para audios de hasta 3 horas
    client_body_timeout 7200;     # 2 horas para upload
    client_body_buffer_size 1M;   # Buffer pequeño para streaming

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;

    server {
        listen 9122;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Frontend - Angular SPA
        location / {
            proxy_pass ${FRONTEND_UPSTREAM};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend API - Laravel
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass ${BACKEND_UPSTREAM};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS headers (backup, Laravel también los maneja)
            add_header Access-Control-Allow-Origin "${CORS_ALLOWED_ORIGIN}" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # Backend Admin Panel - Laravel
        location /admin/ {
            proxy_pass ${BACKEND_UPSTREAM};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Upload de audio con streaming (Arquitectura "Patata Caliente")
        location /api/temas/*/procesar-audio {
            limit_req zone=upload_limit burst=5 nodelay;

            proxy_pass ${BACKEND_UPSTREAM};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # ============================================
            # STREAMING: Desactivar buffering
            # ============================================
            proxy_request_buffering off;  # Streaming del upload a IA
            proxy_buffering off;           # Streaming response para SSE

            # Timeout largo para upload + procesamiento
            proxy_read_timeout 7200s;
            proxy_send_timeout 7200s;
        }

        # SSE (Server-Sent Events) - Actualizaciones en tiempo real
        location /api/transcripciones/ {
            proxy_pass ${BACKEND_UPSTREAM};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # ============================================
            # SSE: Desactivar buffering completamente
            # ============================================
            proxy_buffering off;
            proxy_cache off;
            proxy_request_buffering off;

            # Headers para SSE
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;

            # Timeout largo para mantener conexión SSE
            proxy_read_timeout 7200s;
            proxy_send_timeout 7200s;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
